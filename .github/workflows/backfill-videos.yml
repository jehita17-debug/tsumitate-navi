name: Backfill Videos (過去記事の動画まとめ生成)

on:
  workflow_dispatch:
    inputs:
      since_date:
        description: 'この日付以降の記事を動画化 (YYYY-MM-DD)'
        required: false
        default: '2026-05-27'
      until_date:
        description: 'この日付以前の記事を動画化 (YYYY-MM-DD)'
        required: false
        default: '9999-12-31'
      force:
        description: '既存の動画も作り直す場合は 1'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps (ffmpeg + 日本語フォント)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Backfill videos
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SINCE_DATE: ${{ github.event.inputs.since_date }}
          UNTIL_DATE: ${{ github.event.inputs.until_date }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          python scripts/instagram/backfill_videos.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add instagram/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "auto: 過去記事のInstagram素材バックフィル $(date -u +'%Y-%m-%d')"
            git push
          fi
